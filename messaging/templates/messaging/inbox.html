{% extends "messaging/base.html" %}

{% block content %}

<h1>Inbox 📥</h1>

{% for message in messages %}
<div class="card">
    <strong>From:</strong> {{ message.sender.username }} <br>
    {{ message.content }}

    <br><br>
    <a href="/messaging/message/{{ message.id }}/">Open</a>
</div>
{% empty %}
<p>No messages</p>
{% endfor %}

{% endblock %}
