<!doctype html>
<html>
  <head>
    <title>Sky Teams</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f4f6f9;
      }

      .layout {
        display: flex;
      }

      .main {
        flex: 1;
        padding: 20px;
      }

      .team-card {
        display: flex;
        background: white;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        max-width: 1250px;
        margin: 0 auto 15px auto;
      }

      .avatar-img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        margin-right: 15px;
      }

      .top-card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        max-width: 1250px;
        margin: 0 auto 20px auto;
      }

      .filter-row {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
      }

      .filter-row select,
      .search-form input {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        outline: none;
        font-size: 14px;
        height: 38px;
        box-sizing: border-box;
      }

      .search-form {
        display: flex;
        flex: 2;
      }

      .search-form input {
        flex: 1;
        border-right: none;
        border-top-right-radius: 0;
        border-bottom-right-radius: 0;
      }

      .search-form button {
        width: 80px;
        padding: 8px;
      }

      .search-form button {
        background: #0055a5;
        color: white;
        border: none;
        padding: 0 16px;
        border-radius: 0 6px 6px 0;
        cursor: pointer;
        height: 38px;
      }

      .filter-row select {
        flex: 1;
      }

      .card-footer {
        margin-top: auto;
        display: flex;
        justify-content: flex-end;
      }

      .card-footer button {
        background: #0055a5;
        color: white;
        border: none;
        padding: 10px 20px;
        width: 220px;
        border-radius: 6px;
        cursor: pointer;
      }

      .team-info {
        display: flex;
        flex-direction: column;
        flex: 1;
      }
  
      .team-detail-card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        max-width: 700px;
        margin: auto;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .detail-header {
        display: flex;
        gap: 15px;
        align-items: center;
      }

      .detail-header h2 {
        margin: 0;
      }

      .detail-section {
        margin-top: 20px;
      }

      .detail-section ul {
        padding-left: 20px;
      }

      .detail-section h3 {
        margin-bottom: 8px;
      }

      .detail-actions {
        margin-top: 20px;
        display: flex;
        gap: 10px;
      }

      .detail-actions button {
        background: #0055a5;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 6px;
        cursor: pointer;
      }

      .detail-footer {
        margin-top: 20px;
      }

      .detail-footer button {
        background: #ccc;
        border: none;
        padding: 8px 14px;
        border-radius: 6px;
        cursor: pointer;
      }

      .detail-card {
        padding: 20px;
        line-height: 1.6;
      }

      hr {
        border: none;
        height: 1px;
        background: #eee;
        margin: 15px 0;
      }

      button {
        background: #0055a5;
        transition: all 0.2s ease;
      }

      button:hover {
        background: #003f7d;
        transform: translateY(-2px);
      }
     
      .detail-section {
      margin-top: 25px;
      }
      
      .detail-section h3 {
      margin-bottom: 10px;
      color: #00205b;
      }

      .dep-box {
      background: #f8f9fb;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      }

      
    .detail-section h3 {
     border-bottom: 2px solid #eee;
     padding-bottom: 5px;
     }

    </style>
  </head>

  <body>
    
   

      <div class="main">{% block content %} {% endblock %}</div>
    </div>
  </body>
</html>
