{% extends "messaging/base.html" %}

{% block content %}

<h1>Sent 📤</h1>

{% for message in messages %}
<div class="card">
    <strong>To:</strong> {{ message.receiver.username }} <br>
    {{ message.content }}

    <br><br>
    <a href="/messaging/message/{{ message.id }}/">Open</a>
</div>
{% empty %}
<p>No sent messages</p>
{% endfor %}

{% endblock %}
